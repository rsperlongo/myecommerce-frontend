<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" [opened]="isOpen" class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/home">
        <mat-icon matListIcon>home</mat-icon>
        <span matLine>Home</span>
      </a>
      <a mat-list-item routerLink="/login">
        <mat-icon matListIcon>login</mat-icon>
        <span matLine>Login</span>
      </a>
      <a mat-list-item routerLink="/products">
        <mat-icon matListIcon>shopping_cart</mat-icon>
        <span matLine>Products</span>
      </a>
      <a mat-list-item routerLink="/profile">
        <mat-icon matListIcon>person</mat-icon>
        <span matLine>Profile</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <button mat-button (click)="toggleSidenav()">Toggle Sidenav</button>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
